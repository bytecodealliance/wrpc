version: 2
updates:
- package-ecosystem: "cargo"
  directory: "/"
  schedule:
    interval: "daily"
  ignore:
    - dependency-name: "wit-bindgen"
    - dependency-name: "wit-bindgen-core"
    - dependency-name: "wit-parser"
  groups:
    wasm:
      patterns:
        - "wasi*"
        - "wasm*"
        - "wit-*"

- package-ecosystem: "gomod"
  directory: "/go"
  schedule:
    interval: "daily"

- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "daily"
- package-ecosystem: "github-actions"
  directory: "/.github/actions/build-nix"
  schedule:
    interval: "daily"
- package-ecosystem: "github-actions"
  directory: "/.github/actions/install-nix"
  schedule:
    interval: "daily"

- package-ecosystem: "nix"
  directory: "/"
  schedule:
    interval: "daily"

- package-ecosystem: gomod
  directory: /examples/go/resources-server
  schedule:
    interval: daily

- package-ecosystem: gomod
  directory: /examples/go/hello-client
  schedule:
    interval: daily

- package-ecosystem: gomod
  directory: /examples/go/hello-server
  schedule:
    interval: daily

- package-ecosystem: gomod
  directory: /tests/go
  schedule:
    interval: daily
