wit-bindgen-wrpc-test = { version = "0.1", default-features = false, path = "./crates/wit-bindgen-test" }
wit-component = { version = "0.252", default-features = false }
wit-parser = { version = "0.247", default-features = false }
wrpc-cli = { version = "0.8", path = "./crates/cli", default-features = false }
wrpc-introspect = { version = "0.7", default-features = false, path = "./crates/introspect" }
wrpc-pack = { version = "0.4", path = "./crates/pack", default-features = false }
wrpc-quic = { version = "0.1", path = "./crates/quic", default-features = false }
wrpc-test = { path = "./crates/test", default-features = false }
wrpc-transport = { version = "0.29", path = "./crates/transport", default-features = false }
wrpc-wasi-keyvalue = { version = "0.2", path = "./crates/wasi-keyvalue", default-features = false }
wrpc-wasi-keyvalue-mem = { version = "0.2", path = "./crates/wasi-keyvalue-mem", default-features = false }
wrpc-wasi-keyvalue-redis = { version = "0.2", path = "./crates/wasi-keyvalue-redis", default-features = false }
wrpc-wasmtime = { version = "0.1", path = "./crates/wasmtime", default-features = false }
wrpc-wasmtime-cli = { version = "0.9", path = "./crates/wasmtime-cli", default-features = false }
wrpc-webtransport = { version = "0.1", path = "./crates/webtransport", default-features = false }
wrpc-websockets = { version = "0.1", path = "./crates/websockets", default-features = false }
wtransport = { version = "0.7.0", default-features = false }
