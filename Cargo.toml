[package]
description = "WebAssembly component-native RPC framework based on WIT"
name = "wrpc"
version = "0.17.0"

authors.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true

[workspace.package]
authors = ["Roman Volosatovs <rvolosatovs@riseup.net>"]
categories = ["wasm"]
edition = "2024"
homepage = "https://github.com/bytecodealliance/wrpc"
license = "Apache-2.0 WITH LLVM-exception"
repository = "https://github.com/bytecodealliance/wrpc"

[workspace]
members = [
    "benches/reactor",
    "crates/*",
    "examples/rust/*",
    "examples/web/rust",
]

[features]
default = ["bin", "net", "quic", "wasmtime", "webtransport", "websockets"]

bin = ["bin-bindgen", "bin-wasmtime"]
bin-bindgen = [
    "dep:clap",
    "dep:wit-bindgen-core",
    "dep:wit-bindgen-wrpc-go",
    "dep:wit-bindgen-wrpc-test",
    "wit-bindgen-wrpc-go/clap",
    "wit-bindgen-wrpc-rust/clap",
]
bin-wasmtime = ["dep:tokio", "dep:wrpc-wasmtime-cli", "tokio/rt-multi-thread"]
net = ["wrpc-transport/net"]
quic = ["dep:wrpc-quic"]
wasmtime = ["dep:wrpc-wasmtime"]
webtransport = ["dep:wrpc-webtransport"]
websockets = [
    "dep:wrpc-websockets",
    "wrpc-websockets/rand",
    "wrpc-websockets/ring",
]

[[bin]]
name = "wit-bindgen-wrpc"
required-features = ["bin-bindgen"]

[[bin]]
name = "wrpc-wasmtime"
required-features = ["bin-wasmtime"]

[[bench]]
name = "bench"
harness = false

[profile.bench]
debug = true

[dependencies]
anyhow = { workspace = true, features = ["std"] }
clap = { workspace = true, features = [
    "color",
    "derive",
    "error-context",
    "help",
    "std",
    "suggestions",
    "usage",
], optional = true }
tokio = { workspace = true, optional = true }
tracing = { workspace = true, features = ["attributes"] }
wit-bindgen-core = { workspace = true, optional = true }
wit-bindgen-wrpc = { workspace = true }
wit-bindgen-wrpc-go = { workspace = true, optional = true }
wit-bindgen-wrpc-rust = { workspace = true, optional = true }
wit-bindgen-wrpc-test = { workspace = true, optional = true }
wrpc-cli = { workspace = true, optional = true }
wrpc-quic = { workspace = true, optional = true }
wrpc-transport = { workspace = true }
wrpc-wasmtime = { workspace = true, optional = true }
wrpc-wasmtime-cli = { workspace = true, optional = true }
wrpc-webtransport = { workspace = true, optional = true }
wrpc-websockets = { workspace = true, optional = true }

[dev-dependencies]
anyhow = { workspace = true }
bytes = { workspace = true }
criterion = { workspace = true, features = [
    "async_tokio",
    "cargo_bench_support",
    "html_reports",
    "plotters",
    "rayon",
] }
futures = { workspace = true, features = ["async-await"] }
tempfile = { workspace = true }
test-log = { workspace = true, features = ["color", "log", "trace"] }
tokio = { workspace = true, features = ["net", "process", "rt-multi-thread"] }
tokio-util = { workspace = true }
wasmtime = { workspace = true }
wasmtime-wasi = { workspace = true }
wasmtime-cli-flags = { workspace = true, features = [
    "async",
    "cache",
    "component-model",
    "coredump",
    "cranelift",
    "gc",
    "memory-protection-keys",
    "parallel-compilation",
    "pooling-allocator",
    "threads",
] }
wrpc-test = { workspace = true, features = [
    "quic",
    "webtransport",
    "websockets",
] }
wrpc-transport = { workspace = true, features = ["net"] }

[workspace.dependencies]
anyhow = { version = "1", default-features = false }
axum = { version = "0.8", default-features = false }
bitflags = { version = "2", default-features = false }
bytes = { version = "1", default-features = false }
clap = { version = "4", default-features = false }
criterion = { version = "0.8", default-features = false }
futures = { version = "0.3", default-features = false }
heck = { version = "0.5", default-features = false }
http = { version = "1", default-features = false }
humantime = { version = "2.1", default-features = false }
hyper = { version = "1", default-features = false }
hyper-util = { version = "0.1", default-features = false }
nuid = { version = "0.6", default-features = false }
pin-project-lite = { version = "0.2", default-features = false }
prettyplease = { version = "0.2.37", default-features = false }
proc-macro2 = { version = "1", default-features = false }
quinn = { version = "0.11.6", default-features = false }
quote = { version = "1", default-features = false }
rayon = { version = "1", default-features = false }
rcgen = { version = "0.14", default-features = false }
redis = { version = "1.2", default-features = false }
regex = { version = "1", default-features = false }
reqwest = { version = "0.13", default-features = false }
rustls = { version = "0.23", default-features = false }
semver = { version = "1", default-features = false }
serde = { version = "1", default-features = false }
serde_json = { version = "1", default-features = false }
syn = { version = "2", default-features = false, features = ["printing"] }
tempfile = { version = "3", default-features = false }
test-helpers = { default-features = false, path = "./crates/test-helpers" }
test-log = { version = "0.2", default-features = false }
tokio = { version = "1", default-features = false }
tokio-stream = { version = "0.1", default-features = false }
tokio-util = { version = "0.7", default-features = false }
tokio-websockets = { version = "0.13", default-features = false }
toml = { version = "0.8", default-features = false }
tower = { version = "0.5", default-features = false }
tower-http = { version = "0.7", default-features = false }
tracing = { version = "0.1", default-features = false }
tracing-subscriber = { version = "0.3", default-features = false }
url = { version = "2" }
uuid = { version = "1", default-features = false }
wasi = { version = "0.14", default-features = false }
wasi-preview1-component-adapter-provider = { version = "45", default-features = false }
wasm-tokio = { version = "0.6", default-features = false }
wasm-wave = { version = "0.252", default-features = false }
wasmparser = { version = "0.252", default-features = false }
wasmtime = { version = "45", default-features = false }
wasmtime-cli-flags = { version = "45", default-features = false }
wasmtime-wasi = { version = "45", default-features = false }
wasmtime-wasi-http = { version = "45", default-features = false }
wit-bindgen = { version = "0.45", default-features = false }
wit-bindgen-core = { version = "0.57", default-features = false }
wit-bindgen-wrpc = { version = "0.11", default-features = false, path = "./crates/wit-bindgen" }
